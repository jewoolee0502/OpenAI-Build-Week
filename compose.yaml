services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: imaginelab
      POSTGRES_USER: imaginelab
      POSTGRES_PASSWORD: imaginelab_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imaginelab -d imaginelab"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - imaginelab_postgres:/var/lib/postgresql/data
      - ./backend/docker/postgres-init:/docker-entrypoint-initdb.d:ro

volumes:
  imaginelab_postgres:
